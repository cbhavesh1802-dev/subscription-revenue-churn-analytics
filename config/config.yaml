data:
  ratings_path: "data/ratings.csv"
  movies_path:  "data/movies.csv"
  test_size: 0.20
  random_state: 42

preprocessing:
  rating_scale: [1, 5]          # Original rating range
  normalize_ratings: true       # Scale to [0,1] for sigmoid output

feature_engineering:
  tfidf_max_features: 50        # TF-IDF vocabulary size for titles
  genre_encoder_dim: 32         # Dense layer output for genre features

model:
  embedding_dim: 64             # User and movie embedding dimensions
  mlp_layers: [256, 128, 64, 32]
  dropout_rate: 0.3
  learning_rate: 0.001
  batch_size: 256
  epochs: 50
  early_stopping_patience: 5
  reduce_lr_patience: 3
  reduce_lr_factor: 0.5
  min_lr: 1.0e-6

bias_correction:
  alpha: 0.3                    # Diversity weight (0=none, 1=max diversity)

cold_start:
  top_k: 10                     # Recommendations for new users

evaluation:
  top_k: 10                     # Precision@K and NDCG@K

output:
  models_dir: "models/"
  results_dir: "results/"
